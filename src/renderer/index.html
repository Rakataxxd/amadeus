<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' file: data: blob: *; font-src 'self' *; script-src 'self' 'unsafe-inline'">
  <title>Amadeus</title>
  <link rel="stylesheet" href="vendor/xterm.css">
  <link rel="stylesheet" href="styles.css">
  <script type="importmap">
  {
    "imports": {
      "@xterm/xterm": "./vendor/xterm.mjs",
      "@xterm/addon-fit": "./vendor/addon-fit.mjs",
      "@xterm/addon-webgl": "./vendor/addon-webgl.mjs"
    }
  }
  </script>
</head>
<body>
  <div id="toolbar">
    <div id="toolbar-title">Amadeus</div>
    <div id="toolbar-actions">
      <button id="btn-new-terminal" title="New terminal (Ctrl+Shift+N)">+</button>
      <button id="btn-settings" title="Customize active terminal">&#9881;</button>
    </div>
    <div id="toolbar-window-controls">
      <button class="win-btn" id="btn-minimize">&#x2212;</button>
      <button class="win-btn" id="btn-maximize">&#x25A1;</button>
      <button class="win-btn win-close" id="btn-close">&#x2715;</button>
    </div>
  </div>
  <div id="tab-bar">
    <div id="tabs-container">
    </div>
    <button id="btn-new-tab" title="New workspace">+</button>
  </div>
  <div id="canvas"></div>
  <div id="shell-picker" class="hidden"></div>
  <script type="module" src="index.js"></script>
</body>
</html>
